name: PantryPilot CI

on:
  push:
    branches: [main]
    paths:
      - "PantryPilot_CM_Generic_Files/**"
      - ".github/workflows/pantrypilot-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "PantryPilot_CM_Generic_Files/**"
      - ".github/workflows/pantrypilot-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PantryPilot_CM_Generic_Files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run automated tests
        run: python -m pytest

      - name: Run system tests
        run: python system_test_runner.py
